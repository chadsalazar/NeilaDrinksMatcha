[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/submit-cafe"
  to = "/.netlify/functions/submit-cafe"
  status = 200

[[redirects]]
  from = "/api/community-cafes"
  to = "/.netlify/functions/get-community-cafes"
  status = 200
